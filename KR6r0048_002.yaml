body:
  text: 日本佐伯定胤中野達慧共編大慈恩寺大法師基公塔銘并序朝散大夫撿挍太子左庶子使持節金州諸軍事守金州㓨史兼御史中丞輕車都尉賜紫金魚袋李宏慶撰安國寺內供奉講論大德建初書按吏部李侍郎又碣文法師以皇唐永淳元年仲冬壬寅日卒於慈恩寺翻譯院有生五十一歲也後十日陪葬於樊川元奘法師塔亦起塔焉塔有院大和二年二月五日異時門人安國寺三教大德賜紫法師美林見先師舊塔摧圮遂唱其首率東西街僧之右者奏發舊塔起新塔功未半而疾作會其徒千人盡出常所服玩洎向來箕斂金帛命高足僧令撿俾卒其事明年七月十三日令撿奉行師言啟其故塔得全軀依西國法焚而瘞之其上起塔焉又明年十月賷行狀請宏慶撰其銘予熟聞師之本末不能牢讓師姓尉遲諱基字道其先朔州人累世以功名致爵祿先考宗松都督伯父鄂國公國初有大勳力道身長六尺五寸性敏悟能屬文尤善於句讀凡經史皆一覧無遺三藏法師奘者多聞第一見道頗加竦敬曰若得斯人傳授釋教則流行不竭矣因請於鄂公鄂公感其言奏報天子許之時年一十七既脫儒服披緇衣伏膺奘公未幾而冰寒於水矣以師先有儒學詞藻詔講譯佛經論卅餘部草疏義一百本大行於時謂之慈恩疏其餘崇飾佛像日持經戒瑞光感應者不可勝數嗟乎道其家世在朔漠宜以茹毛飲血鬪爭煞戮背義妄信為事今慕浮屠教苦節希聖深入其奧與夫鄂公佐聖立國公成身退出于其類為一代賢人實稟閒氣習俗不能染也明矣退為銘曰佳城之南兮面南山奘法師兮葬其閒基公既歿兮陪其後甲子一百兮四十九碣文移入兮本寺中曇景取信兮田舍翁義林高足兮曰令撿親承師言兮精誠感試具畚鍤兮發堂全身不朽兮滿異香銘誌分明兮是道齒白骨鮮兮無銷耗瑞雲甘雨兮晝濛濛神祇悉窣兮羅壽宮依教茶毗兮得舍利金瓶盛之兮埋厚地建塔其上兮高巍巍銘勒貞石兮無媿辭深谷為岸兮田為瀛此道寂然兮感則靈大唐大慈恩寺法師基公碑朝請大夫撿校史部侍郎李又撰東郡荷渾寺主沙門正演書法師諱基字洪道姓尉遲氏代郡人也其先魏之別部家代以將師為雄大父懿常寧公伯父敬德鄂國公王考宗松洲都督咸有勳烈書之國史法師植微妙之玄根蘊靈祇之秀液胎而神應有金杵之祥誕則殊表得殊輪之相岐嶷見於能言精微徵於始學爰在家壟首習儒經目一覧而心傳耳蹔聞而口諷性與道合思若有神其時玄弉法師哀像教侵微佛滅之久先遊天竺大俘真記訓譯屬授必待其人以師天假至聰幼入深慧鍾鼓宮而聞外桃李不言而自蹊乃請於鄂國求以為弟子方託以金牒之言傳其玉箱之莪遂特降恩旨捨家從釋又別奉明制操筆賦詞豈支郎之在俗信安隻之得聖真乘因以化城妙簡增其潤色飜授已畢聲花遂尊乃化代朦備修法義所造二諦唯識等章法華瑜伽等疏總一百餘部中自原夏外薄瀛壖聿來周受取為准的師有善說之妙必造於微其明也日月掛於心臺其迅也風霜落於談柄將鴦掘魔不能為智鵬耆舍無所施辨豈唯直比山濤能摧庾高而已加以又持五行之禁握利釰而無傷修六法之檀得意珠而不守嚴戒真施勇進力行常月造彌勒像一軀日誦菩薩戒一遍願生兜率求其志也又有通神之應淖然可觀曾於代郡五臺山造玉石文殊像寫金字般若經竟有神光瑞雲嬰拂臺宇燭燿函笥我無至靈則何臻此能事已畢示化於几以永淳二年歲次壬午十一月庚寅朔十三日壬寅終於京兆大慈恩寺飜經院之小房以其年十二日四日葬於此地葢所以蜜弉公也弉公釋門宗匠皇代名德應天神龍皇帝曾入緇徒為弉公弟子與師同學神龍啟運離躍飛天去湹洛還舊京歷樊壯而悲陳迹弉公而加廟侍惟法師而詣門人有利貞上人者師之神足宿植賢果保遊秘藏勝理盡該精行無缼傳我師之學膺闕𨓍之問入談舟扆述風範而如存出奉翠華郊壟而增惻將歲月之淪𧵍意樹之遷訛乃纂其休音用銘茲石其辭曰淳源散澆風楊有大力拔迷方破煩惱庇清凉唯我師受佛記譯仁典增法事為妙藥解狂醉得四淨遁六難一切法無想觀示有死入泥洹聖人作萬物觀乘天言臨下土信蘭菊榮終古案唐年代曆并和曆錄壬午當永淳元年此文云永淳二年歲次壬午者是可誤也又唐永淳元年當倭天武天皇即位十一年壬午也言天武天皇者淨原天皇也自基滅度永淳元年歲次壬午至延曆七年歲次戊辰合一百七年也釋善殊記京大慈恩寺大乘沙門疏主大師姓蔚遲諱基字洪道鄂公敬德之姪衛公敬宗之子幼年慕道投三藏大師出家疏造百本五天梵語皆通俗年五十有三至永淳二年歲次壬午十一月庚寅朔十三日壬寅終于京兆大慈思寺翻經院矣唐朝太宗皇帝御製讚曰巨哉哲仁逈然出群疏造百本才過萬人妙閑性相理契天親口飜四辯詞發大雲昂昂藏藏法中之王面舒滿月雙眸電光昏衢麗日若海津梁聊申讚謨孰能寅揚時太宗太平興國九年八月十七日於東京梁苑城左衛大相國寺釋迦文院寫得扶桑巡禮五臺山沙門清算題記大唐大慈恩寺大師𦘕讚特進行門下侍郎兼鎮西員外都督江滿昌文慈恩大師尉遲氏諱大乘基長安人族貴五陵光三輔鄂公敬德是其親智勇冠世超衛霍李唐之初大功臣文皇崇師稱大聖生立文垂絲綸羯羅藍位多正夢漠月入口母方娠金人持神珠寶杵託干胎中吉兆頻身相圓滿載誕育肜雲成盖覆菓脣眼浮紫電夏天影面駐素娥秋夜輪少少之時早拔萃齠齔之間含慈惇依止三藏學性相三千徒裏絕等倫七十達者四賢聖就中大師深入神亞聖具體比顏子窮源盡性同大鉤三性五重唯識義愽涉學海到要津百部䟽主五明祖著述以來誰得均字字句句不空置皆有證據永因循伯牙響琴徒秘典卞和泣玉獨霑巾論鼓一振疑關破他宗望風自委塵對龍象眾能降伏昇師子座檀嚬伸每月必造慈氏像一生偏慕兜率身每日必誦菩薩戒唯杖木叉制波旬一時高樓秋燈下有人窺見偷逡巡大光普照觀自在金手染翰顯其真不圖漢土化等覺開甘露門利兆民自書般若何所至清凉山曉五臺春瑞光赫赫慶雲起文殊正現示宿因遊愽陵原製玄贊法華賾旨傳遠賓當寶塔品人有夢諸佛證明遍照隣二十八字一挑句文章微婉柢獲麟傳導大師以此偈千佛滅度讚大仁不嫌暗漏作章疏齒牙煥炳光曜新咫尺龍顏奉鳳詔出入金殿陪紫震天不與善化緣盡歲五十三俄已泯永淳二年十一月仲旬三日為忌辰先師慕側行祔禮風悲雲愁慘松筠本願不回奉彌勒生第四天步華茵名垂萬古涉五竺玄蹤雖多盡難陳心經幽贊序苗神容製云有大乘基法師即三藏法師之入室也俗姓遲氏地開隻服家藏祝光之勳庭列歌鍾門啟𡱝之貴法師始自參玄之歲即厭持梁纔踰志學之年俄隨法侶辭門而趍宴坐解禪袍而習經行含梵干之前風冠禪門之首席雪峯踈夏霜節澄秋澹乎無繫悠然獨往智涵定水業峻𡺸山經耳無遺登心記海激雷奔之迅遠挹驚談崩雲屑雨之奇高推逸辨架澄什而多裕越生肇而餘閑囑累之義攸歸授記之期斯得既而聲雄朝野道被參墟禪枝暎高柳之都智釰含寶符之氣下無伏鬼競同懷璽之勤斜距飛狐爭類欵聞之學代郡清凉之道契於文殊樓煩賈氏之廛神交於惠遠下官謬因驅馹爰踐六飛之地勸預人倫欣聽一音之說寫瓶非喻傾河莫擬金聲遠絕浮學海而無涯玉吻徐開注詞江而不竭法師見𭚾心戰用拯迷途悲其常𥧌之昏錫以司方之授遂因慈誘下示高文所釋般若心經名為幽贊其道備其詞遠為趣也深為文也約片言必善出三界高驤一字無刊踰六塵而秀上窮神盡性山鳴鷲嶽巔藏往知來氷釋池之際欲詮其事見推為序春言多幸雖承四句之恩瞻我勞生何𦱳一塵之墨然則柔音可述懷信授而斯行幽偈方宣瞻大雄而演頌敢因如是爰磬我聞俾夫庶類開曚悟玄門而適道群生鑿竅覩正法而歸真以看千篇刊之如左唐故白馬寺主翻譯惠沼神塔碑并序㓨史李邕撰觀夫譯悲智者匪了義不證演真實者匪悟見不傳是故法雨一句潤心田之沃土覺照身林之大根所以感攝雲來迴白麋至方丈之至若天若人微妙之音至矣備矣允茲在茲和上諱玄字惠沼俗姓劉氏彭城人也曾祖秦隨音州北海縣宰因家住淄川誕育不辰慈愛云黃衣挹鞠于外家歲餘又以黃被覆而歸本宅及能言乃曰往來法有黃者何也父驚異之五歲執繼親喪悲慟過禮識者以為至性所致秊十有二即求出俗十有五屬睿宗降誕有制度入道甞讀金光明經雙見王子救虎尸毗代鴿悅然有捨身之志遂赴山巖交親權途僶俛旋𥰼秊秊廿下問要言愽通經藏尋講法花般若涅槃等經皆智發宿報緣通前佛廿圖華草繫之時人我俱去浮囊之際兩忘夢吐地身便登山頂智者謂云去五欲之毒處萬法之高咸亨三年服膺長安基光二師福智七德其解其空也既證我聞其問也更即汝說慈雲觸石自少陰而滿空德瓶乃一瓦而容海因號山東一遍照又瑳切法花無垢稱金剛般若上下等瑜伽雜集唯識因明俱舍大小幽旨因見道義交激累曰述作萬言因見道章二師歎曰法門後進此一人也何而云惠照耶後行化諸郡敷演群經氷釋而蟄戶啟明雷作而為芽花出栴檀圍遶咨稟萌奔者不可勝計諺曰河南照天下少自此傳授廿餘年又撰能斷般若金光明盂蘭盆溫室等經疏惠日論了義燈等凡六十卷所翻經律論等三百餘軸盛行於代至若上作漸門所以持內外律定慧復得所以超修捨思猶笙簧法音沐浴智海地遷於九義念於三花駢闐讚揚翕習始自下國終聞上京首上四朝綿曠一紀且驛徵者三謁詔講者兩開恩補綱維大德者六員勅翻積經論者四至結壇降雨者一日入內坐夏也如霧然飛依人而表弟子惠沖微惠勝說耶含朏惠日福琳無著法山惠融龍興寺上座惠祥彼微寺惠光大雲寺惠燈法通徒藏惠明正等寺惠嵩法濟寺惠仙等住持五部至圓曾性習群經至明曒日每荷生之心滅不滅之因是用追恩遶贊述庶乎生前之右匪獨衡山歿後之豈伊廬岳其詞曰安住上首和合真僧高步十力是入一乘法界若海碩行如陵灯傳自覺夢叶明微其一堅守律儀愽聞經藏照宣貝葉啟明金杖雖有情業義道無量八部往還四生回向其二累朝情遇一時敷演誘進州邑弘翻宣輦大德恩深三綱詔選齊纏感夜留流其三興言弟子落妖有因天聞聖德物荷陽春卿中七輩殿上三人鑽智慧火熱煩惱薪其四垂蓮表祥特花告玄訓導十方四句職比即緣生勝定水不流覺燈長曙其五靈櫬反葬佛子祖行幡花撲地齊祭傾城晴景雪下虗空鐘鳴黃霰慘送素鶴歡迎信諸天之有感尊宣三世之無情其五沼法師開元二年歲次甲寅十二月十七日滅度從其甲寅至于延曆七年歲次戊辰合七十五年開元二年甲寅當日本世之元明天皇即位和銅七年甲寅也追得文釋善珠之奈良某珍襲秋篠上經之真蹟今夏幸得借之當溜州會之法筵更寫之了明治三十八年十二月十一日末學定胤大周西明寺故大德圓測法師佛舍利塔銘并序貢士宋復撰并書法師諱文雅字圓測親羅國王之孫也三歲出家十五請業初於常辯二法師聽論天聦警越雖數千萬言一歷其耳不忘於心正觀中大宗文皇帝度為僧住京元法寺乃覧毗曇成實俱舍婆娑等論暨古今章疏無不閑曉名聲藹著三藏法師奘公自天竺將還法師預夢婆羅門授果滿懷其所證應勝因夙會及奘公一見契合莫造即命付瑜伽成唯識等論兼所翻大小乘經論皎若生知後被召為西明寺大德撰成唯識論疏十卷解深蜜經疏十卷仁王經疏三卷金剛般若觀所緣論般若心經無量義經等疏羽翼祕典耳目時人所以贊佐奘公使佛法東流大興無窮之教者也法師性樂山水往依終南山雲際寺又去寺三十餘里閴居一所靜志八年西明寺僧徒邀屈還寺講成唯識論時有中天竺三藏地婆訶羅至京奉勅簡召大德五人令與譯密嚴等經法師即居其首後又召入東都講譯新華嚴經卷軸未終遷化於佛授記寺實萬歲通天元年七月二十二日也春秋八十有四以其月二十五日燔於龍門香山寺北谷便立白塔在京學徒西明寺主慈善法師大薦福寺大德勝莊法師等當時已患禮奉無依遂於香山葬所分骸一節盛以寶函石槨別葬於終南山豐德寺東嶺上法師甞昔往游之地墓上起塔塔基內安舍利四十九粒今其路幾不通矣峭壁嶄絕茂林閉險僻藏疾人跡罕到埋光蔽德徒有歲年孰知歸仰由是同州龍興寺仁王院廣越法師勤成志願以大宋政和五年四月八日乃就豐德分供養并諸佛舍利又葬於興教寺奘公塔之左創起新塔規範基公之塔一體無異并基公之塔即舊而新之金輪寶鐸層構雙聳矗如幻成其下各環以廣廡神像崇邃左右以祔奘公焉俾至者景慕起信不知何時而已也及於塔之前創修獻殿六楹落成慶贊之日不暇求能成文者丐余直序其事繫之以銘銘曰貝葉西來兮其功大教流中區兮斯永賴法匠有憑兮誠際會香山迢遙兮悶幽宮豐德峻阻兮藏靈蹤後人依歸兮何適從有越作緣兮神助力雙塔屹立兮基是式以祔奘公兮豈窮極終南相高兮峻倚天盛德巍然兮銘石鐫來者瞻仰兮千萬年
