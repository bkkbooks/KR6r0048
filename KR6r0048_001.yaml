body:
  text: 日本佐伯定胤中野達慧共編大唐故三藏玄弉法師行狀一卷冥詳撰法師諱褘字玄弉俗姓陳漢大丘長仲弓之後本居頴川後徙河南子孫因之為緱氏人焉高祖湛魏清河太守曾山魏征東將軍南陽郡開國公祖國子博士轉司業又轉禮部侍郎文惠英潔有雅操早通經術形長八尺美眉明目裒衣博帶好儒者之容時人方之郭有道郡舉孝廉拜陳留令又遷江陵後隨運將衰遂息纓冕之心結薜蘿之志識者高之親廣平宋氏隨洛州長史法師即第四子也法師粵自褓辰夙標溫嶷逮於二十日更表貞淳機智有殊聰敏絶異爰以宿植早厭樊籠驛思玄門翅神覺道大業之際詔度僧尼時使人大理卿酇善果有許郭之鑒一見法師而謂人此子年齒雖幼風骨甚奇若住釋門必為梁棟因聽落餝止於東都淨土道場時寺有景法師講涅槃經執卷伏膺遂忘寢食又學嚴法師攝論受好逾劇並一聞將盡再覽之後無復所遺衆咸驚異乃令升座覆割暢備盡師宗美問芳聲從發其後隨氏失馭天下沸騰啓兄亂若茲豈可守而死今有長安天下依歸如適之即與俱來時武德元年矣是時創京城亦未有講序初煬帝於東都建四道場召天下名僧居焉景脫基暹為其稱首末年國亂供料停絶多遊綿蜀知法之衆又盛於彼法師啓兄無法事願遊蜀受業兄從之經子午谷入漢川逢空景二法師皆道場之大德從之受學仍相逐進向成都雖在行旅恆執經隨問比至益州攝論毗曇各得一遍諸德既萃大建法筵更聽寶暹攝論道基毗曇志振迦筵敬惜寸陰四五年間究誦諸部講座之下常數百人領悟之才衆人咸伏法師兄因住成都空慧寺即長捷法師焉其亦風神朗俊體狀魁傑加之秀美每出外衢路觀者莫不駐車停蓋講涅槃經攝大乘論阿毗曇兼通史傳及善老莊為蜀人所慕總管酇公行臺尚書韋雲起等特所欽重至於屬詞談吐蘊藉風流接物誘凡篇章書疏和光嗢噱狎道俗之情有出於弟若其亭亭獨秀不雜埃塵遊八宏窮玄理廓魔氣以為志繼聖達而為心匡振頽綱苞挫殊俗涉風波而意靡倦臨大難而節逾高通曩哲之深疑開後賢之未悟垂義功於來裔標準的於當今乃卛生而寡儔非唯兄之弗建也然昆季二人懿德清規芳聲雅質雖盧山將遠無得同焉法師年二十有一以武德五年於城都受具坐夏學律五篇七聚之宗亦一遍斯得益部經論研綜既窮更思入京詢問殊旨條式有礙為兄所留不能遂意乃私與人結商侶泛舟三峽沿江而遁到荊州止天皇寺彼之道浴承風斯文既屬來儀咸請敷説法師為論攝論毗曇各得三遍罷後復北遊詢求先德至相州造休法師質問疑礙又到趙州謁淡法師學成實論又入長安就嶽法師學俱舍論皆一遍而究其旨經目而記於心又於京城諸德尋訪異同僕射宗公簫兄弟又深珍敬奏住大莊嚴寺法師既遍謁賢備餐其説詳考其理各擅宗塗驗之聖典亦隱顯有異莫知適從乃誓遊西方以問所惑辨取十七地論等以釋衆疑即今之瑜伽師地論也又言昔法顯智嚴亦一時之士皆能求法導利羣生吾當繼之乃結侶陳表有敕不許諸人咸退唯法師不屈既方事孤遊又承西路艱嶮乃自試其心以俗問衆善苦種種調伏堪任不退然始入塔啓請申其意願乞衆聖冥加往還無難初法師生也母夢法師衣白衣西去母曰汝是我子今欲何去報曰為求法故去此則造迦維之先兆貞觀三年將欲首塗又求祥應乃夜夢見大海中有蘇迷盧山極為麗嚴意欲登山而洪濤湧不以為懼乃決意而入忽見蓮花踊乎波外應足而生須臾至山又峻峭不可上踊身自騰有搏飈扶而上升至頂四望廓然無復擁礙喜而寤焉遂即行矣時年二十九也時有秦川僧孝達在京學畢還鄉法師與同去展轉遂達爪州訪西路好惡皆云流沙無路行人多結伴侶看牛馬糞及遺骸為標幟風驚沙起骸骨亦平唯多起風魑魅之類東西八百餘里欲孤行者終不可達聞已愁憤不知其計乃禮佛求願願得一人相引過關即玉門關也關抌胡盧河關西百里有一烽烽下有水凡有五烽五烽之外無復戍邏皆長磧耳又乃訪得一胡許送過關臨時復退強憑之乃行夜至河離關十餘里上源有胡桐樹胡乃斬木為橋布草填沙驅馬而過即渡河心極歡喜各下褥而眠夜半胡乃起抽刀行向法師欲為屠害法師即起念佛誦經胡人還坐少時復起謂法師曰國家法私向外國罪名極重前五烽路遊其下必被他投終無得免但一處被擒即死人弟子亦有家纍何能當之王法不可干共師還去法師報曰弉只可向西而死誓不東歸而生檀越不能者任還弉獨自去胡曰師被他投還相牽引終不免罪法師為設重誓縱令身碎為塵終不相引為指天地星月重言胡乃辭別法師與馬一匹而去於是夜發至第一烽水邊飲馬少時飛箭頻來幾著於膝既知他覺急即向之烽上人將火問是何人欲何所去乃去帽現其法服報云從京師來欲求法於婆羅門國人將上烽見挍尉挍尉深相責問法師具陳行意聲淚俱下彼亦慜然垂泣云師能如是任師去儻如所願亦國家之益師且臥於是安置天曉為設食更施糧自送十餘里云師勿過餘烽第五烽外有野馬泉可更取水去法師過第五烽遇風沙大起不知泉處日暗傍一沙溝住下水欲飲馬袋重失手覆之才得一飲之直餘並傾失千里之資此時頓盡煩惱亦何可言三更後復行不知道路唯西北望星月而進至明午後已大渴之雖有乾不能食如是四夜五日無一渧霑喉人馬俱困不能復行遂臥沙中默念觀音不能發語氣殆將絶至第五夜忽有涼風非常冷快體得醒悟馬亦能起復強行二十餘里還臥不能去夢一大神告之強行何為復臥於是復起馬忽異路而去回之不得行可十許里遂遇一池清冷澄徹非常歡喜便飲馬自復澡嗽又取銼飼馬池側亦有青草比明馬健人復解齊更一日一夜就水將息後日盛水漸進更經三日方達伊吾於流沙北維之外復逢鬼魅日有數般困弊難艱免難為記述既至伊吾逢高昌使人還向其王説法師來意王大喜歡遣人將駝馬來迎復到高昌相見悲喜王欲留法師不聽西去法師乃不食四日以盛動之王意亦回王母妃願結母子王願為兄弟許者任師去法師相許王歡喜請講仁王經并為度沙彌四人造法服數十具差達官將安革馬手力倍送又修二十四封書與突厥葉護可汗等諸國并附絞練五百餘匹令遞送云法師者是奴弟願可汗憐師如憐奴使得達婆羅門也於是辭去既到葉護衙所可汗甚歡喜差人遞送終達迦濕彌羅舊云罽賓國也皆可汗之威高昌王之力耳中間所經蔥山雪嶺熱海鐵門危難之事及諸王禮接逢迎之儀不能備敘迦濕彌羅國有大德號僧勝善於經論法師就學俱舍順正理因明聲明等及大毗婆沙國王慜其盡學達無有經本乃給手書十人令為抄寫并餘所須並敕供給學已方出東南入磔迦國徒伴二十餘人相將渡栴陀羅婆伽河東至波羅奢大林中逢賊所將衣資劫掠都盡身命才令到村與諸人告乞各得衣服次到磔迦東境有大菴羅林林中有一七百歲婆羅門觀其面貌可稱三十許明中百論及吠陀書云是龍猛弟子法師就停一月學經百論又東到那僕底國就調伏法師學對法顯宗理門等論又東諒那伽羅寺就月曹法師學衆事分毗婆娑又東到祿勒那國就闍毱多大德學經部毗婆沙又就蜜多犀那論師學薩婆多辨真論展轉到劫毗陀國禮拜聖迹佛昔在忉利天為報母恩一夏説法訖乘三道寶階下人中處又西北至羯若鞠闍國此云曲女城就毗邪犀那三藏學使佛毗婆沙日胄毗婆沙自此東南至阿踰陀國禮聖迹已順殑伽河東下八十餘人同船欲向阿阿穆佉國河之兩岸皆是阿踰迦林蓊藹深茂於林中忽有十餘船賊鼓棹迎流一時而出船中驚擾投河者數人賊擁船向岸令諸人解衣搜求珍寶其賊先事突加天神每於秋中覔一人質狀端美煞取肉血用以祠之求喜福見法師儀容美麗相顧而喜於是則賊遣人取水於花林中和埿塗地作壇牽法師上壇坐令數人拔刀侍立即欲揮刃法師報云遠來求法傳於未聞此心未遂檀越煞之恐無福也賊不納法師知不免謂賊曰願賜少時莫相逼惱使我正念亦是檀越恩澤於是專心覩史多天慈氏菩薩所於心想中若登蘇迷盧山越一二三天見覩史多宮慈氏菩薩妙寶臺菩薩國繞此時身心歡喜不知在壇不憶有賊同伴諸人發聲號哭須臾之間黑風四起折樹飛沙河流湧浪船舫漂覆賊徒大駭問同伴曰此沙門從何處來名字何等報曰從支那國來求法者此也諸君若煞得無量罪且視風波之狀天神已嗔宜忽懺悔賊懼相率懺謝稽首歸依時亦不覺賊以手觸爾乃開眼謂賊曰時至賊曰不敢害師願受懺悔法師受其禮謝廣為説法令其發心諸賊相勸告收諸賊具總投河流所脫衣資各還本主並受五戒風波還靜賊徒歡喜頂禮辭別同伴敬歎轉異於常遠近聞者莫不嗟怪從歷數國又東北至室羅伐悉底國舊曰舍衛訛也聖迹甚多皆得禮敬又到吠舍離城觀維摩詰宅并佛許魔王涅槃處皆往禮敬從此又至摩揭陀國其處聖迹極多法師停七日禮拜方遍從此東南行四百餘里到菩提樹其處周圓三十里內聖迹尤遍法師停八九日禮拜乃遍至第十日那爛陀寺衆差四十德來迎至寺莊宿大目揵連本村明日食後更有二百餘僧及千餘檀越擎舉幢蓋花香來迎引入那爛陀寺既至合衆都集法師與相見衆坐令維那唱法師住寺寺內所有一切共同衆相見訖差二十人有德行者將法師參正法藏即戒賢法師也其人博聞強識佛法及外道經書一切通達又最耆宿時年一百六十歲衆所共尊不敢片其名故號為正法藏法師隨入謁方牽師資務盡其敬頂禮讚歎訖正法藏命法師及諸僧坐問從何處來報從支那國來欲於師處學瑜伽等經論聞已啼泣喚弟子覺賢令説三年已前病惱因緣覺賢曰和上去今三年已前有患四支拘急如火燒刀判之病意厭此身欲不食取盡於夜中夢天人黃金色謂和上曰汝勿厭此身身是法器修習難得汝過去曾作國王多惱衆生故招此苦當自悔責禮誦行道廣通正法業纍可除直欲不食捨之終不得了死已受身還得受苦猶如井輪回轉無息復三年餘有支那國僧欲來於此學諸經論已發在路汝可待之為演説付授彼人得已當轉流通以功德汝罪自滅我是曼殊室利憐愍汝故來相告當依我語今日已後所患亦當漸除語已而滅從爾來和上漸則安隱正法藏又問汝在路經今幾時報曰過三年向欲四年既與昔夢狀同深相慰喻法師親承斯記悲喜不能自勝更起禮謝言意訖辭出安置幼日王院七日供養已更與上房第四重閣加諸供給日得擔步羅一百二十枚檳榔子二十顆豆穀子二十顆龍香一兩供大人朱一升蘇油乳酪石蜜等皆日足有餘一期之料數人食不盡給淨人婆羅門一人出行乘象與二十人陪從免一切僧事寺內主客萬人預此供給者滲法師有十人言供大人米者此即粳米大如烏馬豆成飯已後香聞百餘步摩揭陀國獨有此米餘國更無收植又少唯國王及廣知法大德得食餘人不得故云供大人米其遊履外國見重所至皆此類也法師安置已向王舍城觀禮聖迹數日方周訖已還那爛陀請戒賢法師講瑜伽論同聽者數千人如是聽瑜伽三遍順正理一遍顯揚對法因明聲明集量論等各一遍中百二論各三遍其俱舍婆沙六足阿毗曇等已於迦濕彌羅等諸國聽訖於此尋讀決疑而已如是五年不捨晝夜聽訖復往伴爛拏鉢伐多國尋禮聖迹有孤山極為秀麗山中有精舍中有尅檀觀自在菩薩像特多靈驗有所願求至心皆得其守護人恐塵河於外面各十步作勾欄人有散花請願皆於欄外不許入內法師敬欲往祈請買種種花穿之為縵將到像所至誠禮訖向菩薩跪發三願一者於此學已得平安還歸本國者願花住尊手二者所修福慧願生覩史多天宮事慈氏菩薩若如意者願花挂尊兩臂三者聖教稱衆生界中有一分無佛性者某今自疑不知有無若有佛性修行可成者願花貫尊頂請訖以花縵遙散咸得如言既滿所求歡喜無量於傍見者莫不禮敬而結因緣從此更巡諸國窮南海之濵觀尋聖迹問訪師友復至鉢伐多國有數大德學業可遵因停二年就學正量部根本阿毗達摩及攝正什論教實論等復還那爛陀寺參禮正法藏已復往杖林山居士勝軍論師所論師剎帝利種幼而好內外經書五明數術無不窮覽每依杖山養徒教授恆講佛經道俗宗歸者日數百人諸國王等數來視禮洗足供養封賞城邑時人號為步異此云食邑者法師就學唯識決擇論意義理成無畏論不住涅槃論十二因緣論莊嚴經論及聞瑜伽因明等訖已於夜中忽夢見那爛陀寺房院荒穢並繫水牛無復僧侶法師從幼日王院西門入見第四重閣上有一令人色貌端嚴光明滿空遙指寺外謂法師曰汝隨我看即尋指外望見村邑林池為火焚燒並成灰燼金人曰汝可早歸此處却復十餘年戒日王崩印度荒亂惡人相害當如此地汝宜知之言訖不見法師覺已怪歎向勝軍説之答曰三界無安能知不爾此聖人之垂誡不可不依是法師所行皆為菩薩護念將往印度告尸羅而駐待淹留未返示無常以勸歸若所為不契聖心誰能此祚永微之末戒日王果崩印度飢荒並如所告國家使人王玄策見其事法師在彼之日覩那爛陀寺大德師子光等立中百論宗破瑜伽等義法師語之聖人作論終不相違但學者之不通耳因造會宗論三千頌戒賢師已下見咸稱善彼具流行先有南印度王灌頂師名般若毱多明正量部義造破大乘論七百頌時戒日王因討賊行次烏荼國小乘師等保重此論取以示生并請與大乘擊論王許遂作書與那爛陀寺差四大德善大小宗及外道經者可詣行所擬共小乘外道論我正法藏乃差海惠智覺師子光及法師為四人應王之命未發問復有順世外道來求論難書四十條義懸於寺門法師遣取立論喚外道共論往復三四番婆羅門默無所説先有契屈者斬首相謝外道請依先約法師曰我沙門釋子當不害昆蟲況煞人乎外道歡喜請終身給侍聞者無不稱慶時欲往烏荼乃訪得彼論披尋數處有疑謂所伏婆羅門曰汝曾聽此義不答曰曾聽我於時善法師遣説一遍備得其旨遂尋其謬即申大乘義破之為一千六百頌名制惡見論將呈戒賢及德衆咸悉稱善曰以此窮竅何歒不已法師善得彼宗乃放所伏婆羅門隨意所之外道歡喜辭去往東印度向拘摩羅王談法師之德王聞甚悅發使來請王使再三乃去是時正欲歸還已並裝束那爛陀大德及徒衆咸皆勸住法師念此經論少闕本意取以流通不能建某宿心確然不許於是辭別將經像赴拘摩羅王所其國先來未行佛法多信外道婆羅門教法師至止異黨雲屯請王擊論驗其勝負法師妙辨既開邪徒草靡王加崇重卑詞請問諸佛功德願示所由法師為王述讚如來三身利物因即為造三身論三百偈王乃歡未曾有頂戴受持時戒日王聞法師在拘摩羅王處驚曰我頻請不至何因在此發使語拘摩羅王送支那法師來王知戒日欽戀令嚴象車二萬乘船三萬艘法師溯殑伽河以赴王所至羯未唱祇羅國王見法師頂禮雙足散無量花讚頌訖言曰弟子先遣請法師何為不來法師答當奉命時聽受未了不獲參王王曰師從支那國來彼有秦王破陳樂歌舞之曲秦王者何人有何功德致此詠歌法師報秦王者即支那國今之天子也本國見國王有聖德能除凶禁暴覆潤羣生者則歌而詠之秦王是大聖之人為蒼生撥亂反正重安宇宙再曜三光六合懷恩故有斯詠王曰如此聖人故天遺為物主也於是延入行宮陳諸供養王曰聞造制惡見論何處在法師報在此遂遣取觀甚悅謂其門師等弟子聞曰光既出螢燭奪明師等所寶之宗他皆破訖試救看小乘諸僧無敢言者王曰師論太好在此諸師並皆信伏恐餘國小乘外道尚守愚迷望於中印度曲女城為師作一會命五印度沙門婆羅門外道等發顯大乘使其改邪從正不亦大哉是日發敕普告集曲女城觀支那法師論自冬初而進至臘月方到會場四方沙門婆羅門外道等蘊義洽聞之輩到者數千人王先令造殿容千餘人於中安尊像陳香花音樂設食行施訖請法師升座標舉論宗命諸衆徵擊竟十八日無一人敢問王讚歎施法師銀錢三萬金錢一萬上㲲衣一百具又令大臣將法師袈裟巡衆告唱云支那法師論勝十八日來無敢問並宜知之諸衆歡喜為法師各立美號大乘衆號為摩訶耶那提婆此云大乘天小乘者號為木叉提婆此此解脫天燒香散花禮敬而去自是德音遐振會訖欲還王留更觀七十五日大施觀訖辭還王施大象一頭金銀錢數萬法師受象不受錢等戒日王拘摩羅王等十八大國王流淚辭別北道而歸備經艱險度雪山蔥嶺等歷三十餘國到于闐附表陳請敕遣于闐王多給駝馬至燉煌以貞觀十九年春正月到長安於西域請轉法輪像等七軀經論六百五十七部佛肉舍利一百五十粒二十五日送經像於弘福已謁帝於洛陽三月一日奉敕還京師即於弘福翻譯及修西域記至二十年秋七月十三日進新翻經并請御製經序及進西域記蒙神筆報書極裒揚之美敕書云法師夙標高行早出塵表泛寶舟而登彼岸搜妙道而闢法門弘闡大猷蕩滌衆罪是故慈雲欲卷舒之蔭四空惠日將昏朗之照八極舒朗之者其唯法師乎朕學淺心拙在物猶迷況佛教幽微豐能抑測請為經題非己所聞又云新撰西域記者當自披覽敕奘尚法師又表謝兼重請序至二十二年駕幸玉華宮六月敕追法師既至接以殊禮敕問師比更翻何經論答近翻瑜伽師地論一百卷上曰此論甚大何聖所作復明何義答論是彌勒菩薩造明十七地義何名十七地法師答名及標大旨上甚悅於是敕遣使向京取論論至自披更歡喜因敕所司寫新翻經論為九本頒與雍洛相兖荊揚等九州遣流布法師更請經題恩敕方許至其年八月四日製序訖凡七百八十言題云大唐三藏聖教序通冠新經之首於明月殿命弘文館學士上官儀以所製序對群僚宣讀霞爛錦舒光讚兼極凡厥百僚喜躍慶賀今上在春宮又製述三藏聖教序訖凡五百七十言二聖序文出後法師又陳表謝蒙敕報云朕才謝圭璋言慙博達至於內典尤所未間昨製序文深為鄙拙唯恐穢翰墨於金簡標瓦礫於珠林忽得來書謬承裒讚循躬省慮彌益厚顏善不足稱空勞致謝法師又陳表重謝敕報書云朕往不讀經兼無才智忽製論序翻汙經文具覽來言枉見裒餝愧逢虗美唯益真慙自此之後四方道俗手儛足蹈歌詠連音內外揄揚曾未浹晨而周六合慈雲再蔭惠日重明歸依之徒波回霧委所諸上之化下猶風靡草因賜摩雲納袈裟一領妙絶今古價直萬金又令天下寺觀各度五人冬十月隨駕還京於北闕別弘法院安置有令造慈恩寺於寺西北角造翻經院敕法師移就翻譯給弟子五十人弘福舊處仍給弟子十人看守至永微二年請造梵本經臺蒙敕施物遂得成就至五年六月迎法師入內法師於臨文等殿翻發智等論經數日降手詔飛白書云師年尊此間小窄體中如何又顯慶年中恩敕云大慈恩寺僧玄奘所翻經論既新翻譯文義須精宜令太子太傅尚書左僕射燕國公于志寧中書令兼撿挍吏部尚書南陽縣開國男來濟禮部尚書高陽縣開國男許敬宗黃門侍郎兼撿挍太子左庶子𨸣陰縣開國男薛元超守中書侍郎兼撿挍太子右庶子廣平縣開國男李義府時為看閲有不隱便處即隨事潤色若須學士任量追三兩人又法師請御製大慈恩寺文蒙恩敕許造詞及法師多所裒贊文成後又陳表請神翰自書又蒙恩許書訖法師符佛之再榮遂共京城僧造幢蓋等迎敕又遣見在王公太常九部樂及二縣音聲千餘車助送上居安福門觀之光揚之美難為具述又施摩雲納一領妙類前恩并餘時服百有餘事二年駕幸洛陽宮法師預往安置在稱翠宮於大內麗日殿翻觀所緣緣論等又翻大毗婆沙等論在所無輟其少室山西北緱氏故縣南遊仙鄉控鶴里鳳凰谷是法師之生地某少室山北少林寺是巍孝父所立極山泉之美是并流支譯經之處法師意願拪託至九月陳表請住少林為國翻譯蒙神筆報書云省表知欲晦迹巖泉追林遠而架往託慮禪寂軌澄什以標今仰挹風微實所欽尚朕業空學寡靡究高深然以淺識薄聞未見其可法師津梁三界汲引四生智皎心燈定凝意水非情塵之所曀豈識浪之能驚然以道德可居何必太華疊嶺空寂可舍豈獨少室重巒幸戢來言勿復陳請即市朝大隱不獨貴於昔賢見聞弘益更可珍於即代既戢遺言不敢重請又顯慶三年中敕為皇太子於濮王故宅造西明寺令給法師上房一口新度僧十人以為弟子此地貴於般若所代雖翻未及周備諸德咸請依大本更翻然般若總二十萬偈可成六百卷法師以為在京多務恐難卒了於是屢請居山方蒙恩許往玉花宮寺翻譯仍敕供給一準在京至彼以顯慶五年正月一日翻大般若至龍朔三年十月二十三日終訖凡四處十六會説總六百卷中間又翻成唯識論辨中邊論唯識二十論品類足論等至十一月二十三日命窺基賫表請聖上製大般若經序至十二月七日於蓬萊宮美進時通事舍人馮義宣口敕許法師從少以來常願生彌勒佛所及遊西方又聞無著菩薩兄弟亦願生覩吏多天宮奉事彌勒並得如願俱有證驗益增尅勵自至玉花每因翻譯及禮懺之際恆發願上生覩吏多天見彌勒佛除翻經時以外若晝若夜心心相續無暫恷廢從翻大般若訖後即不復翻譯唯行道禮懺至麟德元年正月一日玉花寺衆及僧等請翻大寶積經法師辭曰知此經於漢土未有經縱翻亦不了固請不免法師曰翻必不滿五行遂譯四行止謂弟子及翻經僧等有為之法必歸磨滅泡幻之質何得久停今麟德元年吾行年六十有三必卒於玉花若於經論有疑宜即速問勿為後悔徒衆聞者無不驚泣皆曰和上尊體康和計年未至耆耄何為忽作此言報曰此事自知非徒衆所悉是時法師未有患徒衆相顧咸生疑怪至正月三日法師又告門人吾恐無常欲往辭佛遂與弟子等往先造俱胝像所禮懺辭別其有翻經僧及子等辭向京覲省者法師皆報云汝宜好去所有衣鉢經書並皆將去吾與汝別汝亦不須更來設來亦不相見去者報云和上康休必無此事法師報曰非汝所知去者果不重見至正月八日有弟子僧玄覺夜見夢一大木浮圖高顯嚴麗意欲瞻仰忽然摧倒崩振心驚遂即睡窹平旦參禮具説此事法師報曰此事屬我不關於汝勿為憂怖至月九日申時又告玉花寺寺主慧德等曰某必當死經云此身可惡猶如死狗某捨命已勿延宮寺宜於山原靜處安置作一容身棺造一周棺蘧蒢輿送至彼可依教火焚最為第一慧德等怪歎不疑即有此事至其日將暮因向後房度一小博損足初經四日仍如常行止至十三日遂即疾臥至十六日閉目開目頻見有白蓮花大於食盤光淨鮮潔至十七日又見無量百千人衆其形偉大皆服錦衣又賫錦綺種種花寶莊嚴法師所住房宇以次漸莊遍翻經院內外堂殿乃至山林並為寶飾花幡幢蓋又奏音樂後見門外無數寶輿有百味飯食及諸香果藥並非人間之物皆將來獻上法師法師辭云此供具六通者所受某未具此德不敢當之雖確辭讓而進獻不止侍者驚觸遂開目向寺衆等具説前事寺主慧德其夜月甚明朗見告坎山上樹並變為白幢蓋兼見二人舉一寶輿種種肴膳被山遍谷似有奉獻尋即參具陳其事正相快會又云某一生已來所明福慧準斯所見功不虗捐信諸所言無有謬也因命翻經僧嘉尚録出比來所翻大般若經瑜伽等大小乘經論總翻七十五部合一千三百三十一卷令其諷讀深自欣慶又云某無常期至宜告門徒並來取別至二十一日寺主慧德夢見無量金像云是千佛東方當翻經院上空中現已還沒至二十二日門徒總集令作捨墮願久所有衣及非衣並皆罄捨造十俱胝像又請僧轉讀行道燒燈供養洗浴衆僧至二十三日設齊訖正午令工人於嘉壽殿以香塗香木樹菩薩像骨對寺衆及門徒各各歡喜辭訣取別又造遺表弟子窺基奉進遂默正念後人説偈教傍人誦云南謨彌勒如來應正等覺取與含識速奉慈顏南謨彌勒如來所居內衆取捨命已必生其中至二月四日看病僧明藏見二人各長丈餘著白衣冠各以一手共擎一大白蓮花花臺三重非常可愛如小車輪許大至法師前立口云無量劫來惱亂衆生諸定業報因令小疾小許輕受並得除滅宜當慶喜莫生憂惱法師見已合掌良久遂自回轉以右脅著床舒足重疊右手支頭左手申安𦝨上迄至命終更不轉動明藏更問見何等相報云勿問妨吾正念至五日中夜弟子光等又問和上定生彌勒前不報云決定得生言訖捨命時經六十日頭髮漸生顏色如常赤白不異又有香了無餘氣得病之時翻經使人許玄備聞奏蒙敕遣醫人將藥往看比至法師已亡醫不及終後坊州判史竇師備聞奏恩敕葬事所須並令官給次奉敕旨玉花寺僧玄弉既亡其翻經事且停已翻成者宜準舊例官為抄寫自餘未翻本付慈恩寺好掌勿令損失其玄弉弟子及翻經僧先非玉花寺僧者宜各放還寺又奉敕旨故僧玄弉葬日宜遣京城僧尼造幢送至墓所冥祥預表其事實繁不備列法師蒙二帝珍敬襯施綿帛綾綵萬餘匹上納袈裟時服等數百年事法師得之皆為國造塔盡俱胝絹像一千幀賢劫千佛一千幀彌勒佛一千幀像十俱胝洗浴衆僧給施貧人一無貯蓄隨得隨散唯以翻譯傳法為務每翻一經急急然恐不終訖一部了已歡喜稱慶云用此以答四恩竊聞八正之旨實出苦海之津梁一乘之宗誠登涅槃之梯蹬但以物機未熟致薀蔥山之西法花化時融方扇交河之石暨乎摩騰入漢教闡伊纏僧會遊吳義覃荊楚從此已來遂得人修解脫之因家樹菩薩之業是知傳法之益其利博哉法師聳千尋之徑質湛萬迹之波瀾救溺俗為心憂匡大法為身事故能陟重阻以求經履危途而訪道見珍殊俗具獲真文自如來一代所説鷲峯方等之教鹿苑半字之文爰至後聖馬鳴龍猛無著天親諸所製依及灰山柱等十八異執之崇五部殊塗之致並收羅研究達其旨悉得其文并佛處代之迹如泥洹堅固之林降魔菩提之樹迦路崇高之塔那竭留影之山皆躬申禮敬亦無遺矣心期充滿覺覽復周將施本土遂繕寫大小乘法教六百五十七部請轉法輪像等七軀佛肉舍利百有餘粒以貞觀十九年春正月二十五日還至長安道俗奔迎傾都罷市又此行經塗數萬備歷難危如固陰凍寒之山飛波激浪之壑厲毒黑風之氣狻猊貙犴之羣並法顯失侶之鄉智嚴遺伴之地班張之所不踐章亥之所未遊法師了爾孤證怛然無梗扇唐風於八河之外揚國仁於五印之間使乎遐域王侯馳心輦歸國轂係仰天衢雖聖威遠感亦法師通述之力也自歸國翻宣若菴園之始説精文奧義如金口之新開而敬惜寸陰勵精無怠神氣綽然無所擁滯遺務之後猶為諸德説西方聖賢製述文義詞旨淺深部類不同并少年在此間周遊講肆之事高論劇談郁哉盈耳了無疲倦其精力過人若斯法師還國已來于今十載合翻梵本七十五部譯為唐言總一千三百四十一卷尚有五百八十二部未譯見翻者大般若瑜伽論大毗婆沙順正理等皆是鎮國之寶學人藪澤然譯經之事其來自文起漢摩騰迄今三藏前後道俗百餘人先代翻譯多是婆羅門法師為初至東夏方言未融承受之者領會艱阻每傳一句必詳審疑回是以倒多説訛今日法師唐梵二方言詞明達傳譯便巧如擎一物掌上示人了然無殊所以歲月未多而功倍前哲至如羅什稱善秦言譯經十有餘年唯得二百餘卷以此挍量難易見矣所悲運促不終其志嗚呼哀哉大唐故三藏玄弉師行狀一卷終明德二年八月日感得了此記冥詳撰云云大師付法傳被引用行狀文彼此符合尤可珍重之也法印權大僧都賢寶記之大唐三藏大遍覺法師塔銘并序朝議郎撿校尚書屯田郎中使持節洺州諸軍事守洺州刺史兼侍御史上柱國賜緋魚袋劉軻撰安國寺內供奉講論沙門建初書歲丁巳開成紀元之明年有具壽沙門曰令撿自上京抵洛師以縹囊盛三藏遺文傳記訪余柴門于行修里且曰聞夫子斧藻羣言舊矣詎直專聲於班馬能不為釋氏董狐耶抑豈不聞貞觀初慈恩三藏之事乎敢矢厥來旨云三藏事迹載國史及慈恩傳今塔在長安城南三十里初高宗塔于白鹿原後徙於此中宗製影贊諡大遍覺肅宗賜塔額曰興教因為興教寺寺在少陵原之陽年歲遠塔無主寺無僧荒涼殘委遊者傷目長慶初有納衣僧曇景始葺之大和二年安國寺三教談論大德內供奉賜紫義林修三藏忌齋于寺齋衆方食見塔上有光圓如覆鏡道俗異之林乃上聞乃與兩街三學人共修身塔兼礱一石於塔至三年修畢林乃化遺言於門人令撿曰爾必求文士銘之撿泣奉遺教直以銘為請非法之冢嫡誰何至此乎軻三讓不可乃略而銘之三藏諱奘俗陳姓河南緱氏人曾父欽後魏上黨太守祖康北齊國子博士父𠅤英長八尺美鬚眉魁岸沉厚號通儒時人方漢郭林宗有子四人奘其季也年十三依兄出家於洛屬隋季失御乃從高祖神堯於晉陽俄又入蜀學攝論毗曇於基暹二法師武德五年受具於成都精究篇學成實於趙州深學俱舍於長安嶽於是西經前來者無不貫綜矣初中國學者多以實相性空通貫羣説俾彖象蹄笱往往失魚兔於得意之路至於星羅碁布五法三性扸秋毫以矢名相界地生彚各有攸處曾未暇也大遍覺乃興言曰佛理圓極片言支説未足師決固是經來未盡吾當求所未聞俾跛眇兒視履必使解行如函蓋始可為具人矣且法顯智嚴何人也猶能孤遊天竺而我安能坐致耶初三藏之生母氏夢法師白衣西去母曰何去曰求法貞觀三年忽夢海中蘇迷盧山遽凌波而入乃見石蓮波外承足山險不可上試踴身騰踔颯然飈舉升中四望廓徹無際覺而自占曰我西行決矣至涼州都督李大亮防禁持功逼法師還京法師乃宵遁渡瓠蘆河出玉門經莫賀延磧艱難險阻仆而復起者何止百十耶自爾涉流沙次伊吾高昌王麴文泰遣貴臣以駝馬迓法師於白力城王與太妃及統師大臣等尊以師禮王親跪於座側俾法師躡履而上資贈甚厚送至護可汗衙又以二十四封書通屈支等二十四國獻花繒五百匹於可汗稱法師是以弟欲求大法於婆羅門國願可汗憐師如憐奴其所歷諸國為其王禮重多此類也自爾支提梵剎神奇靈迹往往而有法師皆瀝誠盡敬耳目所得孕成多聞與夫世稱博物者何相萬耶詳載如傳唯至中印度那爛陀寺等遣下座二十人明詳儀注者引參正法藏即戒賢法師也既入謁肘膝著地嗚足已然後起法藏訊所從來曰自支那欲依師學瑜伽論法藏聞則涕泗曰解我三年前夢金人之説佇爾久矣遂館於幼日王院覺賢房第四重閣日供擔步羅果一百二十枚大人米等稱是其尊敬如此法師既名流五印三學之士仰之如天故大乘師號法師為摩訶天小乘師號解脫天乃白大法藏請留之法師曰師等豈不欲支那之人開佛慧眼耶不數日東印度王抅摩迎法師戒日王聞法師在拘摩處遣使謂抅摩曰急送支那僧來抅摩曰我頭可得僧不可戒日神武雄勇名震諸國乃怒曰爾言頭可得可將頭來抅摩懼乃嚴象軍二萬船三萬與法師同泝殑伽河築行宮于河北抅摩自迎戒日于河南戒日曰支那僧何不來抅摩曰大王可屈就王既見法師接足盡敬且曰弟子聞支那國有秦王破陳樂乃問秦王是何人法師盛談太宗應天順人事王曰不如此何以為支那主因令法師出制惡見論然小乘外道未即推伏請於曲女城集五印沙門婆羅門等兼十八國王觀支那法師之論凡十八日無敢當其鋒者戒日知法師無留意厚以象馬裝餞法師又以素疊印書使達官送法師所經諸國令兵衛達漢境法師却次于闐因高昌商胡人朝附表奏自西域還太宗特降天使迎勞仍制于闐等道送法師令燉煌迎於流沙鄯鄯迎於沮沫時帝在洛陽敕西京留守梁國公元齡偹有司迎待是日宿于漕上十九年春三月景子留守自漕奉迎於都亭有司頒諸寺帳輿花幡送經於宏福翌日大會於朱街之南陳列法師於西域所得經像舍利等其梵文凡五百二十夾六百五十七部以二十馬負而至自朱至宏福十餘里傾都士女夾道鱗次若人非人曾不知幾俱胝矣壬辰法師謁文武聖皇帝於洛陽宮二月己亥對於儀鸞殿因廣問雪嶺已西諸國風俗法師皆偹陳所歷若指諸掌太宗大悅謂趙公無忌曰昔苻堅稱道安為神器今法師出之更遠時帝將征遼法師請於嵩之少林翻譯太宗曰師西去後朕為穆太后於西京造宏福寺寺有禪院可就翻譯三月己巳徙宏福夏五月丁卯法師方開貝葉二十年秋七月法師進新譯經論仍請製經序并進奉敕撰西域記十二卷太宗美法師風儀又有公輔才俾法師裼緇褐襲金紫法師因以五義褒揚聖德乞不奪其志遂問瑜伽十七地義太宗謂侍臣曰朕觀佛經猶瞻天望海法師能於異域得是深法非唯法師願力亦朕與公等宿殖所會及三藏聖教序成神筆自寫太宗居慶福殿百寮陪位坐法師命宏文館學士上官儀對羣寮讀之二十二年夏六月天皇大帝居春宮又製述聖記及菩薩藏經後序太宗因問功德何最法師對以度人自隋季天下祠宇殘毀緇伍殆絶太宗自此敕天下諸州寺宜各度五人宏福寺度五十人戊申皇太子宣令請法師為慈恩上座仍造翻經院偹儀禮自宏福迎法師太宗與皇太子後宮等於安福門執香爐目而送之至寺門敕趙公英中書令褚引入於殿內奏九部樂破陳舞及百戲於庭而還二十三年夏四月法師隨駕於翠微宮談賞終日太宗前席攘袂曰恨相逢已晚翌日太宗崩於含風殿高宗即位法師還慈恩專務翻譯永徽三年春三月法師於寺端門之陽造石浮圖高宗恐功大難成令改用甎塔有七級凡一百八十尺層層中心皆有舍利冬十月中宮方妊請法師加祐既誕神光滿院則中宗孝和皇帝也請號為佛光王受三歸服袈裟度七人請法師為王剃髮及滿月法師進金字般若心經及道具等顯慶二年春二月駕幸洛陽法師與佛光王發於駕前既到館於積翠宮終譯發智婆沙法師早喪所天因扈從還訪故里得張氏姊問塋壠已平矣乃捧遺柩改葬於西原高宗敕所司公給備喪禮盡飾終之道洛下道俗赴者萬餘人釋氏榮之三年正月駕還西京勑法師徙居西明寺高宗以法師先朝所重禮敬彌厚中使旁午朝臣慰問及錫賚無虗日法師隨得隨散中國重於般若前代雖翻譯猶未備衆請翻焉法師以功大恐難就乃請于玉華宮翻譯四年十月法師如玉華館於肅成院五年春正月一日始翻梵本總二十萬偈法師汲汲然常恐不得卒業每厲譯徒必當人百其心至龍朔三年方絶筆法師翻般若後精力刓耗謂門人曰吾所事畢矣吾瞑目後可以蘧蒢為親身物門人雨泣且曰和上何遽發此言法師曰吾知之矣麟德元年春正月八日門人覺夢一大浮圖倒法師曰此吾滅度之兆遂命嘉尚法師具録所翻經論合七十四部總一千三百三十八卷又造俱胝畫像彌勒像各一千幀又造素像十俱胝供養悲敬二田各萬人燒百千燈贖數萬生乃與寺衆辭三稱慈尊願生內眷至二月五日夜弟子光問云和尚決定得生彌勒內衆否頷云得生俄而去春秋六十九矣初高宗聞法師疾作御醫相望於道及坊州奏至帝哀慟為之罷朝三日敕坊州刺史竇師倫令官給葬事又敕宜聽京城僧尼送至塔所門人奉柩於慈恩翻經堂道俗奔赴者日盈千萬以四月十四日葬於東京畿五百里內送者百餘萬人至總章二年四月八日有敕徙於樊川北原傷聖情也法師長七尺眉目若畫直視不顧端嚴若神自大教東流翻譯之盛未有如法師者雖滕蘭澄什康會竺護之流無等級以寄言其彬彬郁郁已布唐梵新經矣自示疾至於升神奇應不可殫紀蓋莫詳位次非上地其孰能如此乎文曰三藏之生本乘願來入自聖胎出於鳳堆大業之季龍潛於并孺子謁帝與兄偕行神堯奇之善果度之不為人臣必為人師師法未足自洛徂蜀學無常師鳥必擇木迹窮夷夏更討身毒寺入爛陀師遇尸羅王逢戒日論得瑜伽瑜伽師地藏教泉府蝟虴名數繭抽聖緒我握其摳赤幡仍竪名高曲女歸我真主主當文皇臣當蔡梁天下真觀佛氏以光光光三藏是護是付付得其人經論彬彬梵語華言胡漢相宣台臣筆受御膝前席積翠飛花恩光奕奕太宗序教天皇述聖揚於王庭百辟流詠三藏慰喜靈祇介祉篾彼滕什無此事我功成矣我名遂矣脫屣玉華升神睹史發棺開殮天香馥馥地位孰分神人是卜中南地高樊川氣清修塔者誰林公是營門人令撿實尸其事銘勒塔旁撿真法子開成四年五月十六日馮翊沙門令撿修建大唐三藏玄奘法師表啓一卷進經論等表沙門玄奘言玄奘聞羲畫既陳肇有書契籀文斯闡爰盛典謨徒以誨義輔德紀情栝性猶纏埃纍之間未出寰區之表豈若龍宮祕旨鷲嶺微詞導群迷於沙界庇交喪於塵劫然則至極無象演其源者法王至理無言詮其道者聖帝伏惟陛下纂靈出震撫運登樞勝茂九瀛掩骨庭而獨步飛英八極𨏭軒昊而高視分麾紫塞翦隨寇於幽陵駐蹕青丘蕩妖氛於蟠木武功既戢歸馬華山文德載宣受圖宛岫於是刊書延閣創禮容臺鳳篆龜文既葳蕤於東觀銀鉤玉字亦洗汙於南宮猶故屬想真如緬懷空寂紹宣妙法以為大訓由是鹿野之談應聖期而重譯雞林之士仰神化以來儀建香城於中洲引玄津於神縣像教東被斯為盛矣玄奘行業無紀空符曲成謬齒緇徒有慙先哲慨然懷憤誓以弘宣憑恃威遠尋靈迹往在西域躬習梵言覽毗尼之奧旨窺多羅之密藏所護梵本經論總一千怢六百五十七部佛像七軀佛肉舍利一百五十粒并骨舍利等一函既而治裝金地旋軔玉門祇奉綸言載合翻譯爰召開士同證慧義研思淹時未能總畢見絶筆者凡五十八卷名曰大菩薩藏經二十卷佛地經一卷六門陀羅尼經一卷顯揚聖教論二十卷大乘阿毗達磨雜集論十六卷勒成八帙繕寫如別及前舍利佛像梵本經論等謹詣闕奉進但聖鑒照明玄言沖遠玄奘學非沉祕識謝詠通何以仰稱天規敬弘至教亦由熒熒爝火對修景以摛光涓涓細流足巨壑而成大追慙戰悸若履氷谷謹言貞觀二十年七月十三日沙門玄奘上進西域記表沙門玄奘言蟠木幽陵雲官紀軒皇之壤流沙滄海夏載著伊堯之域西羌白環薦垂衣之后東夷楛矢賄刑措之君固已飛英曩伐式微前典伏惟陛下握紀乘時提衡範物刳舟弦木威天下而濟群生鼇足蘆灰堙方輿而補圓蓋曜武經於七德闡文教於十倫澤遍泉源化霑蕭葦房芝發秀井浪開華樂囿馴班巢阿響律浮紫膏於貝闕霏白雲於玉撿遂使菀若木而池濛泛霈炎火而照積氷梯赤坂而承朔泛蒼津而委晝史曠前良事絶故府豈如漢開張掖延接金城秦戍桂林裁通珠浦而已玄奘幸屬天地貞觀華夷靜謐冥心梵境敢符好事命均朝露𭄨譬秋螽徒以上假皇靈下資蚓命飄身邁迹求遐自邇展轉膜拜之鄉流離重譯之外條支巨方驗前開賓孤鸞還稽曩實時福歲積人欲天從遂得下處岫而洽提河援鸖林而栖鷲嶺祇園之路麗迤空存王舍之基婆陀可陟尋求歷覽時序推遷言反帝京忽將二紀所聞所履百省卅八國竊以章允之所踐藉空陳廣袤夸父之所淩厲無述土風班超侯而未遠張騫望而非博至於玄奘所記微為詳盡其迂辭瑋説多從翦棄綴為大唐西域記一十二卷繕寫如別玄奘稟質愚魯昧於緝實望須之右筆餝以左言截此蕪辭採其實録標百王之稱首苻九丘於皇代庶使山經悶彩汲傳韜華無任區區謹詣闕奉輕塵旒扆伏深戰謹言貞觀草年七月十三日沙門玄奘狀上請大宗文皇帝作經序并題經表沙門玄奘言玄奘早預玄門幸逢昌運希聞至道遊心法筵每恨正覺遺文尚未詳備遂慨然懷慕遍歷殊方遠賴皇威所期咸濟去年二月奉詔翻譯今見成五部總五十八卷繕寫如別竊見弘福幸尊像初成聖上親降鑾輿開青蓮之目今經論新翻敢録斯義伏願階下曲垂神翰表發經題親紆玄藻序明宗極所望天文祕思與日月齊明玉字銀釣將乾坤等固庶百代之下歌詠無窮千載之外瞻仰無絶不任慺慺之至謹奉表以聞輕觸天威伏增悚汗謹言貞觀草年七月十三日沙門玄奘上表大宗文皇帝報請作經序敕書省書具悉來意法師夙標高行早出塵表泛寶舟而登彼岸搜妙道而闢法門弘闡大猷蕩滌衆罪是故慈雲欲卷舒之蔭四空慧日將昏朗之照八極舒朗之者其惟法師乎朕學淺心柮在物猶迷況佛教幽微豈能仰測請為經題非己所聞又云新撰西域記者當自披覽敕奘尚貞觀草年七月十三日內出與玄奘法師謝大宗文皇帝敕書表沙門玄奘言伏奉墨敕猥垂獎喻祇奉綸言精守振越玄奘誠惶誠恐玄奘業尚空疏謬參法侶幸屬九瀛有截四表無虞憑皇靈以遠征恃國威而訪道窮遐冒險雖勵愚誠慕異懷荒實資朝化所獲經論奉敕翻譯見成卷軸未有詮序伏惟陛下睿思雲敷天華景爛理苞繫象詞逸威英跨千古以飛聲掩百王而騰實竊以神力無方非神思不定詮其理聖教玄遠非聖藻何以序其源故乃冒犯威嚴敢希題目震眷沖邈不垂矜許撫躬纍息相領失圖玄奘聞日月麗天既分暉於戶牖江河紀地亦流潤於巖涯雲和廣樂不祕響於聾昧金璧奇珍豈韜彩於愚瞽敢緣斯理重以于祈伏乞雲雨曲垂天文府照配兩儀而同久與二耀而俱懸然則鷲嶺微言假神筆而弘遠雞園奧典託英詞而宣暢豈止區區梵衆獨荷恩榮蠢蠢迷生方超塵纍而已無任誠懇之至謹詣闕奉表以聞輕觸天威伏深戰栗謹言貞觀草年七月十四日沙門玄奘上表謝納袈裟剃刀表一首沙門玄奘言伏奉敕旨施納袈裟一領賓鐵剃刀一口雲雨曲垂謬霑霈澤光命隆厚精守震越玄奘幸遭文明之化早預息心之侶三業無紀四恩靡答皇眷不遺思榮府墜忍辱之服彩含流霞智慧之刀銛逾切玉謹當服以降煩惱之魔佩以斷塵勞之網起餘譏於彼己懼空疏於冒恩濫叨殊禮慚恧屏營不勝悚荷之至謹奉表陳謝以聞塵黷天鑒伏深戰栗謹言貞觀草二年七月十四日沙門玄奘上表謝大宗文皇帝製三藏聖教序表沙門玄奘言竊聞六爻探局於生滅之場百物正名未涉真如之境猶且違微義册覩奧不測其神遐想軒圖歷選並歸其義伏惟皇帝陛下玉毫降質金輪御天廓先王之九州掩百千之日月廣烈代之區域納恆沙之法界遂使給園精舍並入隄封貝葉靈文咸歸册府玄奘往因振錫聊謁崛山經途萬里帖天威如尺步匪乘千葉詣雙林如食頃搜揚三藏盡龍宮之所儲研究一乘窮鷲嶺之遺旨並已載之素象遠獻紫震尋蒙下詔賜使翻譯玄奘識乖龍樹謬忝傳燈之榮才異馬鳴深愧寫瓶之敏所譯經論紕舛尤多遂符天恩留神構序文超象繫之表若聚日之放千光理括衆妙之門同法雲之濡百草一音演説億劫寂逢忽以微生親承梵響踊躍歡喜如聞受記無任欣荷之極謹奉表詣闕陳謝以聞謹言貞觀草二年八月五日沙門玄奘上表謝大宗文皇帝報玄奘法師謝表敕書朕才謝圭璋言慙博達至於內典尤所未間昨製序文深為鄙拙唯恐穢翰墨於金簡標瓦礫於珠林忽得成來書謬承褒讚循躬省慮彌益厚顏蓋不足稱空勞致謝貞觀草二年八月五日內出與玄奘法師謝述聖記啓沙門玄奘啓竊以識真者寡每苦徂東之路迷方者衆共假司南之車況乎大道玄遠妙門虗寂非乘睿智孰能詮序者哉伏惟皇太子殿下體資宸極仁被春方照佛日以重輝紹法輪於將墜津梁有屬傳燈斯在玄奘志窮佛道誓損軀命自東夏願至西方皇靈護持得經論六百五十七部尋蒙恩敕令玄奘翻譯爰降慈旨為制序文布慈雲於塵劫澍惠雨於沙界殿下遊刃三藏仰弘十善復製述聖之記光闡大猷明實相之門則有而不有談宣寂之境則空應皆空獨得神裏遠超繫表玄奘未澄濁水忽得明珠謹當頂受奉持永為心鏡不任下情悚之至謹奉啓陳謝以聞謹啓貞觀草二年八月五日沙門玄奘上啓皇帝在春宮日報玄奘法師謝啓書治素無才學性不聰敏內典諸文殊未觀覽所作論序鄙拙尤繁忽得來書褒揚讚述撫躬自省慙悚交并勞師遠臻深以為愧貞觀草二年八月五日出內與玄奘法師大宗文皇帝與長命婆羅門書造化陶灼短長異壽天地覆載愚智同生故知上聖上賢無代不有然而前帝寂得於逢朕自領德薄行輕智微力淺幸因夙緣有慶得遇真人自慰藥已來手腳漸覺輕損彌加將慎冀得全除撫疲躬而自歡荷神方而多愧唯憑命於後藥庶遐齡之可期必望超促世而長存駐常顏而不朽既白之髮變素成玄已弊之躬除衰益壯此心此願其可遂乎唯竭深誠敬佇良術貞觀草二年八月十日內出與長命婆羅門玄奘師玄法師請經流行表一首沙門玄奘言竊以玄宗無兆因分教以垂訓法本無為資言象以成化是知詮名教者法王之善權闡言象者聖帝之能事非夫三達遐鑒四弘府濟孰能撫金輪之運弘玉豪之教者歟伏惟皇帝陛下殉齊作聖飲明體道革澆弊之俗垂色穆之化風教被於三千疆場掩於百億臨以政命駕五乘而載馳屈方外之蹤據域中之位四海無虞萬機有暇儲慧寶於麟閣引智水於龍宮玄奘業謝踈通學慙稽古肅承明詔詳譯梵文內領庸愚懼乖玄旨深惟誠欵恐蠹大猷是以夙夜匪懈身心無怠皇化所覃無謬一音之説靈貺所祐有感一人之心晈日回三舍之眼丹誠動九重之聽爰紆神衷序明聖教詞峯切漢已振釋主之宮義海浮天將動梵王之請由是牟尼大訓資聖藻而照宣般若微言憑帝獻而光闡然而幽居陋俗未聞梵響之聲邊荒遠鄙詎覩天文之麗其見譯訖經論請冠御製三藏聖教序及皇太子述聖記宣布遠近咸使聞知太郡名州各施一本是則道不虗行法無留滯慧雲布於遐邇法雨澍於中外皇靈享法施之福永永無窮黎元阜法財之用生生無遺不任誠懇之至謹奉表陳請以聞伏願天慈賜垂矜允輕塵聽覽追增戰汗謹言貞觀草二年八月草日沙門玄奘上表玄奘法師謝東宮書述聖記啓沙門玄奘啓中使光臨伏承明令親降微毫書述聖記曲垂霈澤遠洽虗微恭承竉命對越惶悸竊以日月經天在鑒斯朗聖賢闡化遇感方弘是以真教行於明時大訓興於昌運非乘一人之慶寧洽幽荒非燭三明之智豈照冥昧伏惟皇太子殿下涵神智水澡性玄津資曜克靈繼明增朗業照天縱學貫三乘之玄道亞生知才苞四辨之敏至於開圖陳迹妙窮於八體離經辨志義綜於九疇筆勢雲浮詞峯霧洽含毫變六爻之象揮翰煥三辰之光降甲觀之祕藻闡祇園之奧旨恩等風雲明懸日月淳化所被蒼生荷福澤及幽顯慶洽人天不勝悅豫之誠謹奉啓陳以聞謹啓貞觀草二年八月草六日沙門玄奘上狀請經出流行啓沙門玄奘啓竊以六爻陳迹察陽陰之伏八卦成象考日月之悔希與夫忘言妙辨至道被於人天滿字宏規茂實勝於空有拯淪胥之滯鑒弱喪之流語其取捨功豈同日伏惟皇太子殿下含章育德基性多才仁聲溢於萬惠情留於三寶深窮權實妙達色空不為而道茂忘己而功顯降志紹隆留神贊述如洪鍾之待扣若空谷之必應闡妙象於名言暢幽答於聲教遂乃照之以慧燭濟之以智舟既朗長夜之爰拯暴流之溺三途享福四生受賴玄門慶矣緇徒幸矣然而邊隅泯庶未覩聖皇之藻幽鄙黔黎詎聞正遍之説普天之下並蔭堯雲遐方之俗未霑法雨玄奘飱和惠澤靜恭玄訓祇奉綸誥敬譯梵經有感皇靈擒章序真如之教上回睿思𩢙藻述實相之宗凡厥懷生感欣大賴況親濡澤豈勝踊躍其見譯訖經論請付外流布開慧眼於含識蔭慈雲於群有使夫遺法之徒俱蒙利喜迷方之俗咸遊覺路不任誠懇之至謹奉啓陳請以聞輕慶聽覽伏增戰栗謹啓皇帝在春宮日所寫六門陀羅尼經及題菩薩藏經等謝啓沙門玄奘啓中使曲臨光命隆渥伏奉神筆所寫六門陀羅尼經一卷及題大菩薩藏經等六十六卷殊私忽降惕然惟答惠澤光被欣若登高竊以至教希夷理出窅之外玄章沖邈道闡言象之間顯晦從時行藏在運非屬淳和之化豈弘幽顯之訓者哉伏惟皇太子殿下德隆天地道照圓光三靈宅心萬式望布慧雲而蔭火宅聲法鼓而警幽途霈然蒙潤超然逈齊與夫皮紙骨筆之誠曾何足喻亡身殉命之誓領彼多慚斯乃慶集皇靈永馭金輪之運福滋聖善速紹王毫之位玄奘內省庸菲觀道慶辰生微用淺空荷榮渥不勝抃躍之至謹奉啓陳謝以聞輕繁省覽伏用惶悚謹啓貞觀草二年九月十八日沙門玄奘上啓玄奘法師請附訊物及書往西域表沙門玄奘言蓋聞道隆䨱載功玄而化廣德綏內外邇肅而遠安是以垂則天之教成因地之化斯固宰物之大統馭宇之洪範也伏惟皇帝陛下資玄象之盛明縱厚載之至德裁成品類光闡彝倫左袵之鄉重譯納貢反舌之俗請吏革音非夫德通神明仁被幽顯何以霧開重阻風卷絶域者哉玄奘德憑帝力問道遐方祇奉法言服膺梵學博考名相之源頗問權實之致聿成宣譯式符玄訓上感皇情重闡鷲山之道遠崇佛旨再演龍宮之典靜言教義功歸遐人探大猷誠惟明導無為味法有荷洪恩不謝深仁恐蕪王化玄奘爰初歸國以至于今凡厥緇徒深喜求法愍其弊服頗惠僧衣今者見有袈裟三領聖恩所賜紬綾十匹諸寺訪得繡像綵幡及諸供養道具之
