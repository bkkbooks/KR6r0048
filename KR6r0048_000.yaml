front:
  text: 玄弉三藏師資傳叢書目次卷上大唐故三藏玄奘法師行狀一卷唐冥詳撰大唐三藏大遍覺法師塔銘并序唐劉軻撰大唐三藏玄奘法師表啓一卷不完卷下大慈恩寺大法師基公塔銘并序唐李宏慶撰大唐大慈恩寺法師基公唐李又撰唐太宗皇帝御製基公讚記日本清算記大唐大慈恩寺大師畫讚唐江滿昌文撰心經幽贊序唐苗神容製唐故白馬寺主翻譯慧沼神塔并序唐李雍撰大周西明寺故大德圓測法師佛舍利塔銘并序唐宋復撰玄奘三藏師資傳叢書目次終
